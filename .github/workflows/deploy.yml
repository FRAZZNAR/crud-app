name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Etapa 1: Pruebas Jest ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm test

  # ── Etapa 2: K6 Load Test ─────────────────────────────────────────────────
  k6-load-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Start server in background
        run: node src/app-server.js &
        env:
          PORT: 3000
      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 15000
      - name: Run K6 load tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load-test.js
        env:
          BASE_URL: http://localhost:3000

  # ── Etapa 3: Build y push a GHCR ─────────────────────────────────────────
  build-and-push:
    needs: k6-load-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Etapa 4: Deploy Blue-Green al servidor GCP ───────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy new slot on docker-server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ $(( ${{ github.run_number }} % 2 )) -eq 1 ]; then
              NEW=blue; NEW_PORT=3000; OLD=green
            else
              NEW=green; NEW_PORT=3001; OLD=blue
            fi
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/frazznar/crud-app:main
            docker stop crud-app-$OLD || true
            docker rm crud-app-$OLD || true
            docker run -d --name crud-app-$NEW -p $NEW_PORT:3000 --restart always -e SLOT=$NEW ghcr.io/frazznar/crud-app:main

      - name: Switch nginx to new slot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ $(( ${{ github.run_number }} % 2 )) -eq 1 ]; then
              NEW_PORT=3000
            else
              NEW_PORT=3001
            fi
            sudo sed -i "s|proxy_pass http://10\.0\.2\.2:[0-9]*|proxy_pass http://10.0.2.2:$NEW_PORT|g" /etc/nginx/sites-available/crud-app
            sudo nginx -t && sudo systemctl reload nginx
